name: gamypad_pc
description: Use your smartphone as a gamepad on Linux
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.2.0+1  

environment:
  sdk: ^3.10.0-162.1.beta
dependencies:
  ffi: ^2.1.4
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  path: ^1.9.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.11.0
  flutter_lints: ^6.0.0


flutter_icons:
  android: true
  image_path: "assets/icon.png"

